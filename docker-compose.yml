services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: recall
      POSTGRES_PASSWORD: recall
      POSTGRES_DB: recall
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recall"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: recall
      MINIO_ROOT_PASSWORD: recall-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn recall.api.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://recall:recall@postgres:5432/recall
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    profiles: ["app"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m recall.services.worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://recall:recall@postgres:5432/recall
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
    volumes:
      - ./data:/app/data
      - whispermodels:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    profiles: ["app"]

  poller:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m recall.services.poller
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://recall:recall@postgres:5432/recall
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["app"]

  engagement:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m recall.services.engagement
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://recall:recall@postgres:5432/recall
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["app"]

  frontend:
    build:
      context: ./frontend
    environment:
      BACKEND_URL: http://api:8000
      BACKEND_API_KEY: ${API_KEY:-change-me}
    ports:
      - "3000:3000"
    depends_on:
      - api
    profiles: ["app"]

volumes:
  pgdata:
  miniodata:
  whispermodels:
